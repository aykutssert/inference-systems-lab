name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  service-foundations:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/01-service-foundations

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.20"
          enable-cache: true
          cache-dependency-glob: projects/01-service-foundations/uv.lock

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src tests

      - name: Test
        run: uv run pytest

      - name: Build container
        run: docker build .
