apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-foundations
  labels:
    app: service-foundations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-foundations
  template:
    metadata:
      labels:
        app: service-foundations
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: service
          image: ghcr.io/aykutssert/inference-systems-lab/service-foundations:0.1.0
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          env:
            - name: APP_HOST
              value: 0.0.0.0
            - name: APP_ENVIRONMENT
              value: kubernetes
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: service-foundations-secrets
                  key: internal-api-token
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
